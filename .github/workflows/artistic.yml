name: ArtistIC Render

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Full Flow"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      - 'artistic/**'

concurrency:
  group: artistic-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  render:
    name: Render and deploy map
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Free disk space
        uses: ./.github/actions/free-space

      - name: Find latest successful Full Flow run
        if: ${{ github.event_name != 'workflow_run' }}
        id: find-run
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(curl -fsSL \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/full-flow.yml/runs?branch=main&status=completed&conclusion=success&per_page=1" \
            | jq -r '.workflow_runs[0].id')"

          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "No successful Full Flow run found on main." >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download sealed GDS
        uses: actions/download-artifact@v8
        with:
          name: full-sealed-gds
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || steps.find-run.outputs.run-id }}
          path: klayout/out

      - name: Download OpenROAD outputs
        uses: actions/download-artifact@v8
        with:
          name: full-openroad
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || steps.find-run.outputs.run-id }}
          path: openroad

      - name: Install host rendering tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y imagemagick img2pdf inkscape potrace
          python3 -m pip install --break-system-packages Pillow svgpathtools

      - name: Install OSEDA Python dependencies
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: "pip install --break-system-packages gdspy"
          log_name: artistic-install.log

      - name: Prepare logo
        shell: bash
        run: |
          set -euo pipefail
          cd artistic
          ./run_artistic.sh --prepare-logo

      - name: Create logo GDS
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: "cd artistic; ./run_artistic.sh --create-logo croc.sealed.gds.gz"
          log_name: artistic-create-logo.log

      - name: Render raw chip
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: "cd artistic; ./run_artistic.sh --render-raw"
          log_name: artistic-render-raw.log

      - name: Render PDF and outline
        shell: bash
        run: |
          set -euo pipefail
          cd artistic
          ./run_artistic.sh --render-pdf
          ./run_artistic.sh --outline

      - name: Render map raw
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: "cd artistic; ./run_artistic.sh --render-map-raw"
          log_name: artistic-render-map-raw.log

      - name: Render map database
        shell: bash
        run: |
          set -euo pipefail
          cd artistic
          ./run_artistic.sh --render-map-db

      - name: Upload ArtistIC artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artistic-render
          if-no-files-found: ignore
          path: |
            artistic-install.log
            artistic-create-logo.log
            artistic-render-raw.log
            artistic-render-map-raw.log
            artistic/meerkat_work/croc.sealed.gds.gz
            artistic/meerkat_work/croc_logo.*
            artistic/meerkat_work/*.log
            artistic/renderics/croc_modules.*
            artistic/renderics/croc_render.*
            artistic/renderics/croc_colors.svg
            artistic/renderics/*.log

      - name: Prepare pages payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artistic/mapify/snapshots
          cp openroad/reports/04_croc.routed.png artistic/mapify/croc_routed.png
          cp artistic/meerkat_work/croc_logo.gds artistic/mapify/croc_logo.gds
          cp artistic/renderics/croc_modules.jpg artistic/mapify/croc_modules.jpg
          cp artistic/renderics/croc_render.jpg artistic/mapify/croc_render.jpg
          cp openroad/reports/04_croc.routed.png artistic/mapify/snapshots/fftodile_routed.png
          cp artistic/renderics/croc_modules.jpg artistic/mapify/snapshots/fftodile_modules.jpg
          cp artistic/renderics/croc_render.jpg artistic/mapify/snapshots/fftodile_render.jpg

      - name: Upload map viewer
        uses: actions/upload-pages-artifact@v5
        with:
          path: artistic/mapify

      - name: Deploy pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5

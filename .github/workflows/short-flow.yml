name: Short Flow

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'

concurrency:
  group: short-flow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free disk space
        uses: ./.github/actions/free-space
      - name: Run simulation flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_sim_flow.sh"
      - name: Upload built software
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-sw
          path: sw/bin
      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-simulation-output
          path: |
            verilator/croc.fst
            verilator/croc.log
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-test-logs
          path: verilator/test_*.log

  fft-variants:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            verilator_flags: ''
            riscv_ccflags: ''
          - name: length8
            verilator_flags: -GFftLength=8
            riscv_ccflags: -DFFT_SYNTH_LENGTH=8 -DFFT_SYNTH_LOG2_LENGTH=3
          - name: scale-none
            verilator_flags: -GFftScalingMode=0
            riscv_ccflags: ''
          - name: inverse
            verilator_flags: -GFftInverse=1
            riscv_ccflags: -DFFT_REF_USE_INVERSE=1
          - name: rounding-saturation
            verilator_flags: -GFftUseRounding=1 -GFftUseSaturation=1
            riscv_ccflags: -DFFT_REF_USE_ROUNDING=1 -DFFT_REF_USE_SATURATION=1
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free disk space
        uses: ./.github/actions/free-space
      - name: Run FFT variant in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: >-
            .github/scripts/run_fft_variant.sh
            '${{ matrix.name }}'
            '${{ matrix.verilator_flags }}'
            '${{ matrix.riscv_ccflags }}'
      - name: Check FFT variant metrics
        run: >-
          python3 .github/scripts/check_metrics.py variant
          --variant '${{ matrix.name }}'
          --baseline .github/metrics/baseline.json
          --metrics 'verilator/fft-${{ matrix.name }}-metrics.json'
      - name: Upload FFT variant logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-fft-${{ matrix.name }}
          path: |
            result.log
            verilator/croc.log
            verilator/croc.fst
            verilator/fft-${{ matrix.name }}.log
            verilator/fft-${{ matrix.name }}.fst
            verilator/fft-${{ matrix.name }}-bench.log
            verilator/fft-${{ matrix.name }}-benchmark.csv
            verilator/fft-${{ matrix.name }}-metrics.json

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free disk space
        uses: ./.github/actions/free-space
      - name: Run FFT benchmark in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_benchmark.sh"
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-benchmark
          path: |
            result.log
            verilator/croc.log
            verilator/fft_benchmark.log
            verilator/fft_benchmark.csv
            verilator/croc.fst

  synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free disk space
        uses: ./.github/actions/free-space
      - name: Run synthesis flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_synth_flow.sh"
      - name: Check synthesis metrics (default config)
        run: >-
          python3 .github/scripts/check_metrics.py synth
          --config default
          --baseline .github/metrics/baseline.json
          --metrics yosys/reports/croc_metrics.json
      - name: Upload synthesis outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-synth-reports
          path: |
            yosys/reports
            yosys/out
